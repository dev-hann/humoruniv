name: humoruniv
description: "Unofficial Flutter app for humoruniv.com"
publish_to: 'none'
version: 1.6.0+8

environment:
  sdk: ^3.11.5

dependencies:
  charset_converter: ^2.1.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.7.0
  flex_color_scheme: ^8.1.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_widget_from_html: ^0.17.2
  get_it: ^8.0.3
  go_router: ^14.8.1
  html: ^0.15.5
  package_info_plus: ^8.3.0
  photo_view: ^0.15.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.2
  video_player: ^2.11.1

  meta: any
  visibility_detector: ^0.4.0+2
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.0
  test: ^1.24.0
  very_good_analysis: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  package_info_plus_platform_interface: ^3.2.1
  url_launcher_platform_interface: ^2.3.2

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FF6D00"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true
